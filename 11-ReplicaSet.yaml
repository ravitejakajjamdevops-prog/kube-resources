apiVersion: app/v1
kind: ReplicaSet
metadata:
  name: nginx-replicaset
  labels:
    project: roboshop
    environment: dev
    component: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      project: roboshop
      environment: dev
      component: frontend
  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
        component: frontend
    spec:
      containers:
      - name: nginx
        image: nginx